version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 962804699607.dkr.ecr.us-west-2.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t jake-capstone-repo:latest src
      - docker tag jake-capstone-repo:latest 962804699607.dkr.ecr.us-west-2.amazonaws.com/jake-capstone-repo:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker image to ECR...
      - docker push 962804699607.dkr.ecr.us-west-2.amazonaws.com/jake-capstone-repo:latest
      - echo Writing image definitions file...
      - printf '[{"name":"jake-react-app","imageUri":"962804699607.dkr.ecr.us-west-2.amazonaws.com/jake-capstone-repo:latest"}]' > imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json
